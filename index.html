<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賢者の返信 — 悩みに、哲学者が答える</title>
  <meta name="description" content="今の悩みを入力すると、古今東西の哲学者が名言とともに答えてくれます。心に響いた言葉は、そのまま画像にしてシェアできます。" />

  <!-- OGP / Twitter（SNSでリンクを貼ったときの見え方） -->
  <meta property="og:title" content="賢者の返信 — 悩みに、哲学者が答える" />
  <meta property="og:description" content="今の悩みを入力すると、古今東西の哲学者が名言とともに答えてくれます。心に響いた言葉は画像にしてシェアできます。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sousuyou.github.io/kenja-no-henshin/" />
  <meta property="og:image" content="https://sousuyou.github.io/kenja-no-henshin/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="賢者の返信 — 悩みに、哲学者が答える" />
  <meta name="twitter:description" content="悩みを入力すると、哲学者が名言で答えてくれます。" />
  <meta name="twitter:image" content="https://sousuyou.github.io/kenja-no-henshin/og.png" />
  <meta name="theme-color" content="#070b1c" />

  <!-- フォント：明朝（見出し・名言）／Cormorant（デコ欧文）／ゴシック（UI） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 背景：放射状の金線サンバースト（2層が逆回転）／星屑／ヴィネット -->
  <div class="bg" aria-hidden="true">
    <svg class="radiant" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#d4af5a" fill="none" stroke-width="1">
        <circle cx="500" cy="500" r="120" stroke-opacity=".55" />
        <circle cx="500" cy="500" r="240" stroke-opacity=".42" />
        <circle cx="500" cy="500" r="360" stroke-opacity=".30" />
        <circle cx="500" cy="500" r="470" stroke-opacity=".20" />
      </g>
      <g id="rays" stroke="#d4af5a" stroke-width="1" stroke-opacity=".38" fill="none"></g>
      <g id="diamonds" stroke="#d4af5a" stroke-width="1" stroke-opacity=".34" fill="none"></g>
    </svg>
    <svg class="radiant radiant-2" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <g id="fan" stroke="#e7c878" stroke-width="1" stroke-opacity=".30" fill="none"></g>
      <g id="starsDeco" stroke="#e7c878" stroke-width="1" stroke-opacity=".40" fill="none"></g>
    </svg>
  </div>
  <canvas id="stars" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="stage">
    <div class="frame">
      <!-- 四隅の意匠 -->
      <svg class="fcnr tl" viewBox="0 0 100 100" aria-hidden="true"><g stroke-width="1.2"><path class="draw" style="--len:120;--d:.9s" d="M30 70 Q30 30 70 30" /><path class="draw" style="--len:140;--d:1.05s" d="M42 96 Q42 42 96 42" /><circle class="draw" style="--len:30;--d:1.2s" cx="58" cy="58" r="4" /></g></svg>
      <svg class="fcnr tr" viewBox="0 0 100 100" aria-hidden="true"><g stroke-width="1.2"><path class="draw" style="--len:120;--d:.95s" d="M30 70 Q30 30 70 30" /><path class="draw" style="--len:140;--d:1.1s" d="M42 96 Q42 42 96 42" /><circle class="draw" style="--len:30;--d:1.25s" cx="58" cy="58" r="4" /></g></svg>
      <svg class="fcnr bl" viewBox="0 0 100 100" aria-hidden="true"><g stroke-width="1.2"><path class="draw" style="--len:120;--d:1.0s" d="M30 70 Q30 30 70 30" /><path class="draw" style="--len:140;--d:1.15s" d="M42 96 Q42 42 96 42" /><circle class="draw" style="--len:30;--d:1.3s" cx="58" cy="58" r="4" /></g></svg>
      <svg class="fcnr br" viewBox="0 0 100 100" aria-hidden="true"><g stroke-width="1.2"><path class="draw" style="--len:120;--d:1.05s" d="M30 70 Q30 30 70 30" /><path class="draw" style="--len:140;--d:1.2s" d="M42 96 Q42 42 96 42" /><circle class="draw" style="--len:30;--d:1.35s" cx="58" cy="58" r="4" /></g></svg>

      <!-- ===== ヒーロー（入力） ===== -->
      <section class="hero" id="hero">
        <div class="crest reveal" style="--rd:.2s">
          <svg viewBox="0 0 100 100" aria-hidden="true"><g stroke-width="1.4">
            <path class="draw" style="--len:260;--d:.5s" d="M50 8 L62 38 L92 38 L68 58 L77 90 L50 70 L23 90 L32 58 L8 38 L38 38 Z" />
            <circle class="draw" style="--len:160;--d:.9s" cx="50" cy="50" r="22" />
            <circle class="draw" style="--len:60;--d:1.2s" cx="50" cy="50" r="7" />
          </g></svg>
        </div>

        <p class="eyebrow reveal" style="--rd:.35s"><span class="rule"></span>悩みに、哲学者が答える<span class="rule r"></span></p>

        <div class="title-wrap reveal" style="--rd:.5s">
          <div class="title-flank">
            <svg class="lozenge" viewBox="0 0 60 60" aria-hidden="true"><g stroke-width="1.3">
              <path class="draw" style="--len:200;--d:.9s" d="M30 4 L46 30 L30 56 L14 30 Z" />
              <path class="draw" style="--len:120;--d:1.1s" d="M30 16 L38 30 L30 44 L22 30 Z" />
              <line class="draw" style="--len:60;--d:1.3s" x1="0" y1="30" x2="14" y2="30" />
            </g></svg>
            <h1 class="title">賢者の返信</h1>
            <svg class="lozenge flip" viewBox="0 0 60 60" aria-hidden="true"><g stroke-width="1.3">
              <path class="draw" style="--len:200;--d:.9s" d="M30 4 L46 30 L30 56 L14 30 Z" />
              <path class="draw" style="--len:120;--d:1.1s" d="M30 16 L38 30 L30 44 L22 30 Z" />
              <line class="draw" style="--len:60;--d:1.3s" x1="0" y1="30" x2="14" y2="30" />
            </g></svg>
          </div>
        </div>

        <p class="lead reveal" style="--rd:.65s">いま心にあることを、そのまま書いてください。<br />2500年分の知恵が、あなたに言葉を返します。</p>

        <div class="divider reveal" style="--rd:.78s">
          <span class="ln"></span><span class="dot sm"></span><span class="dot"></span><span class="dot sm"></span><span class="ln r"></span>
        </div>

        <form class="composer reveal" id="composer" style="--rd:.9s">
          <label class="field-label" for="worry">心の声をしるす</label>
          <div class="ta-shell">
            <svg class="corner-mk cm-tl" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 7 L1 1 L7 1" /></svg>
            <svg class="corner-mk cm-tr" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 7 L1 1 L7 1" /></svg>
            <svg class="corner-mk cm-bl" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 7 L1 1 L7 1" /></svg>
            <svg class="corner-mk cm-br" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 7 L1 1 L7 1" /></svg>
            <textarea id="worry" rows="3" maxlength="200" placeholder="例：頑張っているのに結果が出ず、自分には才能がないのかもと落ち込んでいる。"></textarea>
          </div>
          <div class="composer__bottom">
            <span class="composer__count"><span id="count">0</span>/200</span>
          </div>
          <div class="ask-row">
            <button type="submit" class="btn-ask" id="askBtn">賢者に聞く</button>
          </div>
        </form>

        <p class="micro reveal" style="--rd:1.05s">沈黙のうちに、言葉が選ばれます</p>

        <div class="chips reveal" id="chips" style="--rd:1.15s" aria-label="例文">
          <button class="chip-ex" type="button">仕事で評価されず焦っている</button>
          <button class="chip-ex" type="button">人間関係に疲れてしまった</button>
          <button class="chip-ex" type="button">何のために生きているのか分からない</button>
          <button class="chip-ex" type="button">将来が不安で眠れない</button>
        </div>

        <!-- 今日の賢者（日替わり・連続来訪） -->
        <section class="daily reveal" id="daily" style="--rd:1.25s" hidden>
          <div class="daily-head">
            <span class="daily-eyebrow">🌅 今日の賢者</span>
            <span class="daily-streak" id="dailyStreak" hidden></span>
          </div>
          <p class="daily-hook" id="dailyHook">　</p>
          <div class="daily-foot">
            <span class="daily-name" id="dailyName"></span>
            <button class="daily-open" id="dailyOpen" type="button">今日の一枚を読む →</button>
          </div>
        </section>

        <button class="favlink" id="favOpen" type="button" hidden>♥ 保存した言葉（<span id="favCount">0</span>）</button>
      </section>

      <!-- ===== 結果 ===== -->
      <section class="results" id="results" hidden>
        <div class="oracle-cap">
          <span class="ln"></span>
          <p class="results__theme" id="resultHead">　</p>
          <span class="ln r"></span>
        </div>
        <div class="results__tools" id="resultTools">
          <button class="chip-tool battle-cta" id="battleBtn" type="button" hidden>⚔ 二人の賢者で対決させる</button>
          <button class="chip-tool" id="rerollBtn" type="button">別の賢者に聞く ↻</button>
          <button class="chip-tool" id="copyLinkBtn" type="button">リンクをコピー</button>
        </div>

        <div class="cards" id="cards"></div>

        <button class="chip-tool reset" id="resetBtn" type="button">もう一度、別の悩みを書く</button>
      </section>

      <div class="footer-mark">
        <span class="ln"></span><span>Sapientia</span><span class="ln r"></span>
      </div>
    </div>
  </main>

  <!-- 画像生成用の隠しキャンバス -->
  <canvas id="shareCanvas" width="1080" height="1080" hidden></canvas>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
